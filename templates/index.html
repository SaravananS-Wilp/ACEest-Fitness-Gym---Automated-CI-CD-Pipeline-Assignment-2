<!DOCTYPE html>
<html>
<head>
    <title>ACE Fitness</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            margin-top: 50px;
        }
        form {
            background: white;
            padding: 20px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }
        button {
            background: #28a745;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

    <h2>ACE Fitness - BMI Calculator</h2>

    <form method="POST">
        <input type="number" step="any" name="weight" placeholder="Weight (kg)" required><br>
        <input type="number" step="any" name="height" placeholder="Height (m)" required><br>
        <button type="submit">Calculate</button>
    </form>

    {% if bmi %}
    <h3>Your BMI: {{ bmi }}</h3>
    <h3>Category: {{ category }}</h3>
   {% endif %}

{% if error %}
    <h3 style="color:red;">Error: {{ error }}</h3>
{% endif %}

</body>
</html>
