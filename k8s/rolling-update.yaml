apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-rolling
  labels:
    app: aceest-fitness
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest-fitness
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: aceest-fitness
    spec:
      containers:
        - name: aceest-fitness
          image: docker.io/your-dockerhub-username/aceest-fitness:rolling
          ports:
            - containerPort: 5000
