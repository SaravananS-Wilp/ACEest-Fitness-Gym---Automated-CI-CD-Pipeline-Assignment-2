version: "3"

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-devops
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -c "
      apt update &&
      apt install -y python3 python3-pip docker.io &&
      /usr/local/bin/jenkins.sh
      "

volumes:
  jenkins_home: